name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:
  buildiOS:
    runs-on: macos-26

    env:
      SYNCFUSION_KEY: ${{ secrets.SYNCFUSION_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # https://docs.github.com/en/actions/deployment/deploying-xcode-applications/installing-an-apple-certificate-on-macos-runners-for-xcode-development
      # github docs for installing cert and provisioning profile

      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode --output $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Install .NET MAUI
        shell: bash
        run: |
          dotnet nuget locals all --clear 
          dotnet workload install maui 
          dotnet workload install ios maccatalyst tvos macos maui
    
      - name: Restore nuget packages
        run: |
          dotnet restore iron-plus.sln
        
      - name: Set build version
        id: version
        run: |
          BASE=$(grep -oP '(?<=<ApplicationDisplayVersion>)[^<]+' IronPlus/IronPlus.csproj)
          echo "display_version=${BASE}.${{ github.run_number }}" >> $GITHUB_OUTPUT

        # https://docs.microsoft.com/en-us/dotnet/maui/ios/deployment/overview
      - name: Build iOS App
        shell: bash
        run: |
          dotnet publish IronPlus/IronPlus.csproj \
            -f net10.0-ios \
            -c Release \
            -r ios-arm64 \
            /p:ApplicationVersion=${{ github.run_number }} \
            /p:ApplicationDisplayVersion=${{ steps.version.outputs.display_version }} \
            /p:CodesignKey="${{ secrets.SIGNING_IDENTITY }}" \
            /p:CodesignProvision="${{ secrets.PROVISIONING_PROFILE_UUID }}"

#       - name: Build and Run UnitTests
#         shell: bash
#         run: |
#           dotnet build <path to unit test csproj>
#           dotnet test <path to unit test csproj> --no-build --verbosity normal

      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: |
            IronPlus/bin/Release/net10.0-ios/ios-arm64/publish/*.ipa
      
