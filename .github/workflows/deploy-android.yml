name: Deploy Android

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    env:
      SYNCFUSION_KEY: ${{ secrets.SYNCFUSION_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
      KEY_ALIAS: ${{ vars.ANDROID_KEYSTORE_ALIAS }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore IronPlus/IronPlus.csproj

      - name: Publish AAB
        run: dotnet publish IronPlus/IronPlus.csproj -c Release -f:net10.0-android -o output

      - name: Download bundletool
        run: |
          curl -L -o bundletool.jar https://github.com/google/bundletool/releases/download/1.15.0/bundletool-all-1.15.0.jar

      - name: Convert base64 to jks
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Convert AAB to signed APK
        run: |
          java -jar bundletool.jar build-apks \
            --bundle=output/com.ironplusdev.ironplus.aab \
            --output=output/app.apks \
            --mode=universal \
            --overwrite \
            --ks=release.keystore \
            --ks-key-alias=$KEY_ALIAS \
            --ks-pass=pass:$KEYSTORE_PASSWORD \
            --key-pass=pass:$KEY_PASSWORD
          unzip output/app.apks -d output/apks

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: output/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: android-app
          path: output/

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GOOGLE_WIF_PROVIDER }}
          service_account: ${{ vars.GOOGLE_PLAY_SERVICE_ACCOUNT_EMAIL }}

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.ironplusdev.ironplus
          releaseFiles: output/com.ironplusdev.ironplus.aab
          tracks: internal
