name: Build Android App

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-android:
    runs-on: macos-15

    env:
      SYNCFUSION_KEY: ${{ secrets.SYNCFUSION_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
      KEY_ALIAS: ${{ vars.ANDROID_KEYSTORE_ALIAS }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore IronPlus/IronPlus.csproj

      - name: Set build version
        id: version
        run: |
          BASE=$(sed -n 's|.*<ApplicationDisplayVersion>\([^<]*\)</ApplicationDisplayVersion>.*|\1|p' IronPlus/IronPlus.csproj)
          echo "display_version=${BASE}.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Publish AAB
        run: |
          dotnet publish IronPlus/IronPlus.csproj \
            -c Release \
            -f net10.0-android \
            -o output \
            /p:AndroidPackageFormat=aab \
            /p:ApplicationVersion=${{ github.run_number }} \
            /p:ApplicationDisplayVersion=${{ steps.version.outputs.display_version }}

      - name: Sign AAB
        run: |
          AAB=$(find output -name "*.aab" -type f | head -1)
          echo "Signing: $AAB"
          zip -d "$AAB" 'META-INF/*' || true
          "$JAVA_HOME/bin/jarsigner" \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "$AAB" \
            "$KEY_ALIAS"
          "$JAVA_HOME/bin/jarsigner" -verify -verbose "$AAB"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: output/*.aab
