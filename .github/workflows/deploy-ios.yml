name: Deploy iOS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy from'
        default: 'main'
        required: false

jobs:
  deploy:
    runs-on: macos-latest
    if: github.actor == 'theblindoracle'
    permissions:
      contents: read
      actions: read

    steps:
      - name: Get latest successful build run ID
        id: get-run-id
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/macos-build.yml/runs?status=success&branch=${{ inputs.branch }}&per_page=1" \
            --jq '.workflow_runs[0].id')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful macos-build run found for branch '${{ inputs.branch }}'"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Download build artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ steps.get-run-id.outputs.run_id }} \
            --repo ${{ github.repository }} \
            --name ios-app \
            --dir artifacts/

      - name: Find IPA path
        id: find-ipa
        run: echo "ipa_path=$(find artifacts -name '*.ipa' -type f | head -1)" >> $GITHUB_OUTPUT

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.find-ipa.outputs.ipa_path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
